app:
  # frontend URL — this should be where users reach the app in their browser,
  # NOT 7007 (that's the backend). Set to your Linux box's address.
  baseUrl: http://10.1.149.10:5705

backend:
  baseUrl: http://10.1.149.10:5705
  listen:
    host: 0.0.0.0
    port: 5705
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

auth:
  environment: production
  providers:
    ldap:
      production:
        cookies:
          secure: false
          field: 'backstage-token'
        ldapAuthenticationOptions:
          userSearchBase: 'OU=NPCI Users,OU=NPCI,DC=npci,DC=org,DC=in'
          usernameAttribute: 'sAMAccountName'
          adminDn: 'CN=Hadoop Admin,OU=Server Service Account,OU=Servers,DC=npci,DC=org,DC=in'
          adminPassword: 'Securegen@229933$'
          ldapOpts:
            url: 'ldaps://10.88.1.121:636'
    guest: {}

catalog:
  providers:
    ldapOrg:
      default:
        target: ldaps://10.88.1.121:636
        bind:
          dn: 'CN=Hadoop Admin,OU=Server Service Account,OU=Servers,DC=npci,DC=org,DC=in'
          secret: 'Securegen@229933$'
        users:
          - dn: 'OU=NPCI Users,OU=NPCI,DC=npci,DC=org,DC=in'
            options:
              filter: (&(objectClass=user)(!(objectClass=computer)))
            map:
              rdn: cn
              name: sAMAccountName
              displayName: displayName
              email: mail
        schedule:
          frequency: { minutes: 60 }
          timeout: { minutes: 15 }
          initialDelay: { seconds: 30 }
  locations:
    # paths are relative to the working dir inside the container (/app),
    # so ./examples resolves to /app/examples — matches how the image is built
    - type: file
      target: ./examples/groups.yaml
      rules:
        - allow: [Group]

    - type: file
      target: ./examples/entities.yaml

    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ./examples/test-service.yaml

    - type: file
      target: ./examples/market-innovation.yaml
      rules:
        - allow: [System]

    - type: file
      target: ./examples/test-service-api.yaml
      rules:
        - allow: [API]

    - type: file
      target: ./examples/test-db.yaml
      rules:
        - allow: [Resource]

    - type: file
      target: ./examples/chat-api.yaml
      rules:
        - allow: [API]