app:
  title: Scaffolded Backstage App
  baseUrl: http://localhost:3000

  packages: all

  extensions:
    - page:catalog:
        config:
          path: /
    - catalog-filter:catalog/list:
        config:
          initialFilter: all

organization:
  name: NPCI

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'
  actions:
    pluginSources:
      - auth
      - catalog
      - scaffolder

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}
  gitlab:
    - host: gitlab.com
      token: glpat-ENgmfpdJiV6Q2i0Htuq4F2M6MQpvOjEKdTpuMGd1Ng8.01.170k11kwi

proxy:

techdocs:
  builder: 'local'
  generator:
    runIn: 'docker'
  publisher:
    type: 'local'

auth:
  environment: development
  providers:
    ldap:
      development:
        cookies:
          secure: false
          field: 'backstage-token'
        ldapAuthenticationOptions:
          userSearchBase: 'ou=People,dc=npci,dc=local'
          usernameAttribute: 'mail'
          adminDn: 'cn=admin,dc=npci,dc=local'
          adminPassword: 'admin'
          ldapOpts:
            url: 'ldap://localhost:389'
    guest: {}
  experimentalClientIdMetadataDocuments:
    enabled: false

scaffolder:

catalog:
  providers:
    ldapOrg:
      default:
        target: ldap://localhost:389
        bind:
          dn: cn=admin,dc=npci,dc=local
          secret: admin
        users:
          - dn: ou=People,dc=npci,dc=local
            options:
              filter: (objectClass=inetOrgPerson)
            map:
              rdn: uid
              name: uid
              displayName: cn
              email: mail
        # Groups come from the git-hosted groups.yaml location below.
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location]
  locations:
    - type: url
      target: https://gitlab.com/saket.aryanr64x-group/manifests/-/blob/main/groups.yaml
      rules:
        - allow: [Group, User]

    - type: file
      target: ../../examples/entities.yaml

    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]

    - type: file
      target: ../../examples/test-service.yaml

    - type: file
      target: ../../examples/market-innovation.yaml
      rules:
        - allow: [System]

    - type: file
      target: ../../examples/test-service-api.yaml
      rules:
        - allow: [API]

    - type: file
      target: ../../examples/test-db.yaml
      rules:
        - allow: [Resource]

    - type: file
      target: ../../examples/chat-api.yaml
      rules:
        - allow: [API]

kubernetes:

permission:
  enabled: true

mcpActions:
  name: 'My Company Backstage'
  description: 'Tools for managing your software catalog, creating new services from templates, and exploring your developer portal'

productionRequests:
  jenkins:
    baseUrl: http://localhost:8080
    username: aryan_saket
    apiToken: 11b2713664d7358543e408c1e75ab4a81c
  gitlab:
    apiToken: glpat-ENgmfpdJiV6Q2i0Htuq4F2M6MQpvOjEKdTpuMGd1Ng8.01.170k11kwi
    issueProject: 'saket.aryanr64x-group/manifests'
  argocd:
    baseUrl: http://localhost:8081
    apiToken: replace-me-with-argocd-api-token